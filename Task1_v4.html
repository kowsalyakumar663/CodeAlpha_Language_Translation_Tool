<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Language Translation Tool — CodeAlpha</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:'Poppins',sans-serif;padding:24px 14px;color:#fff;}
.header{text-align:center;margin-bottom:28px;}
.icon{font-size:44px;margin-bottom:6px;}
h1{font-size:clamp(20px,5vw,34px);font-weight:800;background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sub{color:#94a3b8;margin-top:6px;font-size:13px;}
.badge{display:inline-block;margin-top:8px;padding:4px 14px;border-radius:20px;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.4);font-size:11px;color:#a78bfa;}
.card{max-width:800px;margin:0 auto;background:rgba(255,255,255,0.05);border-radius:18px;border:1px solid rgba(255,255,255,0.1);overflow:hidden;}
.lang-bar{display:flex;align-items:center;gap:10px;padding:18px 20px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08);flex-wrap:wrap;}
.lg{flex:1;min-width:120px;}
.lg label{font-size:10px;color:#94a3b8;letter-spacing:1px;display:block;margin-bottom:5px;}
select{width:100%;padding:9px 12px;border-radius:9px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:14px;cursor:pointer;outline:none;font-family:'Poppins',sans-serif;}
select option{background:#1e1b4b;color:#fff;}
.swap{margin-top:16px;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#60a5fa);border:none;cursor:pointer;font-size:18px;color:#fff;flex-shrink:0;transition:transform 0.3s;}
.swap:hover{transform:rotate(180deg);}
.sec{padding:18px 20px;}
.sec.bb{border-bottom:1px solid rgba(255,255,255,0.08);}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.lbl{font-size:11px;letter-spacing:1px;font-weight:600;}
.purple{color:#a78bfa;}.green{color:#34d399;}
.cnt{font-size:11px;color:#64748b;}
textarea{width:100%;background:transparent;border:none;outline:none;color:#e2e8f0;font-size:15px;resize:none;font-family:'Poppins',sans-serif;line-height:1.7;min-height:100px;}
textarea::placeholder{color:#475569;}
#out{min-height:100px;font-size:15px;line-height:1.7;color:#475569;font-style:italic;word-break:break-word;}
#out.ready{color:#e2e8f0;font-style:normal;}
#out.err{color:#f87171;font-style:normal;}
.cpbtn{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:12px;font-family:'Poppins',sans-serif;display:none;}
.cpbtn.show{display:inline;}
.cpbtn.ok{color:#34d399;}
.btns{display:flex;gap:10px;padding:14px 20px;background:rgba(255,255,255,0.03);border-top:1px solid rgba(255,255,255,0.08);}
#tbtn{flex:1;padding:13px;border-radius:11px;background:linear-gradient(135deg,#a78bfa,#60a5fa);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;}
#tbtn:disabled{opacity:0.5;cursor:not-allowed;}
.cbtn{padding:13px 18px;border-radius:11px;background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.3);color:#f87171;font-size:14px;cursor:pointer;font-family:'Poppins',sans-serif;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(167,139,250,0.3);border-top-color:#a78bfa;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.footer{text-align:center;margin-top:20px;color:#334155;font-size:11px;}
</style>
</head>
<body>

<div class="header">
  <div class="icon">🌐</div>
  <h1>Language Translation Tool</h1>
  <p class="sub">Translate Any Text · 10 Languages</p>
  <div class="badge">CodeAlpha Internship — Task 1</div>
</div>

<div class="card">
  <div class="lang-bar">
    <div class="lg">
      <label>SOURCE LANGUAGE</label>
      <select id="src">
        <option value="en">🇬🇧 English</option>
        <option value="hi">🇮🇳 Hindi</option>
        <option value="ta">🇮🇳 Tamil</option>
        <option value="es">🇪🇸 Spanish</option>
        <option value="fr">🇫🇷 French</option>
        <option value="de">🇩🇪 German</option>
        <option value="ar">🇸🇦 Arabic</option>
        <option value="ja">🇯🇵 Japanese</option>
        <option value="ko">🇰🇷 Korean</option>
        <option value="ru">🇷🇺 Russian</option>
      </select>
    </div>
    <button class="swap" onclick="swapLangs()">⇄</button>
    <div class="lg">
      <label>TARGET LANGUAGE</label>
      <select id="tgt">
        <option value="hi">🇮🇳 Hindi</option>
        <option value="ta">🇮🇳 Tamil</option>
        <option value="en">🇬🇧 English</option>
        <option value="es">🇪🇸 Spanish</option>
        <option value="fr">🇫🇷 French</option>
        <option value="de">🇩🇪 German</option>
        <option value="ar">🇸🇦 Arabic</option>
        <option value="ja">🇯🇵 Japanese</option>
        <option value="ko">🇰🇷 Korean</option>
        <option value="ru">🇷🇺 Russian</option>
      </select>
    </div>
  </div>

  <div class="sec bb">
    <div class="row">
      <span class="lbl purple">INPUT TEXT</span>
      <span class="cnt" id="cnt">0 / 500</span>
    </div>
    <textarea id="inp" rows="5" placeholder="Type any text here to translate..." maxlength="500" oninput="countChars()"></textarea>
  </div>

  <div class="sec">
    <div class="row">
      <span class="lbl green">TRANSLATION</span>
      <button class="cpbtn" id="cpbtn" onclick="copyOut()">📋 Copy</button>
    </div>
    <div id="out">Translation will appear here...</div>
  </div>

  <div class="btns">
    <button id="tbtn" onclick="doTranslate()">🌐 Translate</button>
    <button class="cbtn" onclick="clearAll()">🗑 Clear</button>
  </div>
</div>

<div class="footer">CodeAlpha AI Internship · Task 1 · Language Translation Tool</div>

<script>
function countChars(){
  document.getElementById('cnt').textContent = document.getElementById('inp').value.length + ' / 500';
}

function swapLangs(){
  const s=document.getElementById('src'), t=document.getElementById('tgt');
  const tmp=s.value; s.value=t.value; t.value=tmp;
  const out=document.getElementById('out'), inp=document.getElementById('inp');
  if(out.classList.contains('ready')){
    const tmp2=inp.value; inp.value=out.textContent; out.textContent=tmp2; countChars();
  }
}

// MyMemory — works on Android, no AbortSignal needed
async function doTranslate(){
  const text = document.getElementById('inp').value.trim();
  if(!text){ alert('Please enter text to translate!'); return; }
  const src = document.getElementById('src').value;
  const tgt = document.getElementById('tgt').value;
  if(src===tgt){ alert('Please select different languages!'); return; }

  const out = document.getElementById('out');
  const btn = document.getElementById('tbtn');
  const cpbtn = document.getElementById('cpbtn');

  out.className='';
  out.innerHTML='<span class="spin"></span> Translating...';
  btn.disabled=true;
  cpbtn.classList.remove('show');

  try {
    // MyMemory free API — works on all devices, no CORS issues
    const url = 'https://api.mymemory.translated.net/get?q=' 
      + encodeURIComponent(text) 
      + '&langpair=' + src + '%7C' + tgt;

    const res = await fetch(url, {
      method: 'GET',
      headers: { 'Accept': 'application/json' }
    });

    if(!res.ok) throw new Error('HTTP error ' + res.status);

    const data = await res.json();

    if(data.responseStatus === 200 && data.responseData && data.responseData.translatedText){
      const result = data.responseData.translatedText;

      // Check for error messages in response
      if(result.toUpperCase().includes('MYMEMORY WARNING') || 
         result.toUpperCase().includes('QUERY LIMIT') ||
         result.toUpperCase().includes('IS AN INVALID')){
        throw new Error('API limit reached');
      }

      out.textContent = result;
      out.className = 'ready';
      cpbtn.classList.add('show');

    } else {
      throw new Error('Translation not found');
    }

  } catch(e) {
    out.className = 'err';
    if(e.message === 'API limit reached'){
      out.textContent = '⚠️ Daily limit reached. Please try again after some time.';
    } else {
      out.textContent = '⚠️ Translation failed: ' + e.message + '. Please check your internet and try again.';
    }
  }

  btn.disabled = false;
}

function copyOut(){
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const b=document.getElementById('cpbtn');
  b.textContent='✅ Copied!'; b.classList.add('ok');
  setTimeout(()=>{ b.textContent='📋 Copy'; b.classList.remove('ok'); },2000);
}

function clearAll(){
  document.getElementById('inp').value='';
  document.getElementById('out').textContent='Translation will appear here...';
  document.getElementById('out').className='';
  document.getElementById('cpbtn').classList.remove('show');
  document.getElementById('cnt').textContent='0 / 500';
}

document.getElementById('inp').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.ctrlKey) doTranslate();
});
</script>
</body>
</html>

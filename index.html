<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Language Translation Tool — CodeAlpha</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Poppins', sans-serif;
      padding: 30px 16px;
      color: #fff;
    }
    .header { text-align: center; margin-bottom: 32px; }
    .header .icon { font-size: 48px; margin-bottom: 8px; }
    .header h1 {
      font-size: clamp(22px, 6vw, 38px);
      font-weight: 800;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    .header p { color: #94a3b8; margin-top: 8px; font-size: 14px; }
    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 5px 16px;
      border-radius: 20px;
      background: rgba(167,139,250,0.15);
      border: 1px solid rgba(167,139,250,0.4);
      font-size: 12px;
      color: #a78bfa;
      letter-spacing: 1px;
    }
    .card {
      max-width: 860px;
      margin: 0 auto;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .lang-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
    }
    .lang-group { flex: 1; min-width: 120px; }
    .lang-group label {
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 6px;
    }
    select {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      outline: none;
      font-family: 'Poppins', sans-serif;
    }
    select option { background: #302b63; }
    .swap-btn {
      margin-top: 18px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.3s;
    }
    .swap-btn:hover { transform: rotate(180deg); }
    .text-area-section { padding: 20px 24px; }
    .text-area-section.border-b { border-bottom: 1px solid rgba(255,255,255,0.08); }
    .area-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .area-label { font-size: 12px; letter-spacing: 1px; }
    .input-label { color: #a78bfa; }
    .output-label { color: #34d399; }
    .char-count { font-size: 12px; color: #64748b; }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 16px;
      resize: vertical;
      font-family: 'Poppins', sans-serif;
      line-height: 1.6;
      min-height: 120px;
    }
    textarea::placeholder { color: #475569; }
    .output-box {
      min-height: 100px;
      font-size: 16px;
      line-height: 1.6;
      color: #475569;
      font-style: italic;
    }
    .output-box.has-text { color: #e2e8f0; font-style: normal; }
    .output-box.error { color: #f87171; font-style: normal; }
    .copy-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
    }
    .copy-btn.copied { color: #34d399; }
    .btn-row {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
    }
    .translate-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }
    .translate-btn:disabled {
      background: rgba(255,255,255,0.1);
      cursor: not-allowed;
    }
    .clear-btn {
      padding: 14px 20px;
      border-radius: 12px;
      background: rgba(248,113,113,0.15);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
      font-size: 15px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }
    .loader {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #64748b;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(167,139,250,0.3);
      border-top: 3px solid #a78bfa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; margin-top: 28px; color: #475569; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">🌐</div>
    <h1>Language Translation Tool</h1>
    <p>AI-powered · 12 Languages · Instant Results</p>
    <div class="badge">CodeAlpha Internship — Task 1</div>
  </div>

  <div class="card">
    <!-- Language Bar -->
    <div class="lang-bar">
      <div class="lang-group">
        <label>SOURCE LANGUAGE</label>
        <select id="sourceLang">
          <option value="English">English</option>
          <option value="Hindi">Hindi</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
          <option value="German">German</option>
          <option value="Chinese">Chinese</option>
          <option value="Arabic">Arabic</option>
          <option value="Portuguese">Portuguese</option>
          <option value="Russian">Russian</option>
          <option value="Japanese">Japanese</option>
          <option value="Korean">Korean</option>
          <option value="Italian">Italian</option>
        </select>
      </div>
      <button class="swap-btn" onclick="swapLanguages()" title="Swap">⇄</button>
      <div class="lang-group">
        <label>TARGET LANGUAGE</label>
        <select id="targetLang">
          <option value="Hindi">Hindi</option>
          <option value="English">English</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
          <option value="German">German</option>
          <option value="Chinese">Chinese</option>
          <option value="Arabic">Arabic</option>
          <option value="Portuguese">Portuguese</option>
          <option value="Russian">Russian</option>
          <option value="Japanese">Japanese</option>
          <option value="Korean">Korean</option>
          <option value="Italian">Italian</option>
        </select>
      </div>
    </div>

    <!-- Input -->
    <div class="text-area-section border-b">
      <div class="area-header">
        <span class="area-label input-label">INPUT TEXT</span>
        <span class="char-count" id="charCount">0/1000</span>
      </div>
      <textarea id="inputText" placeholder="Enter text to translate..." rows="5"
        oninput="updateCount()"></textarea>
    </div>

    <!-- Output -->
    <div class="text-area-section">
      <div class="area-header">
        <span class="area-label output-label">TRANSLATION</span>
        <button class="copy-btn" id="copyBtn" onclick="copyText()" style="display:none">📋 Copy</button>
      </div>
      <div class="output-box" id="outputBox">Translation will appear here...</div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="translate-btn" id="translateBtn" onclick="translate()">🌐 Translate</button>
      <button class="clear-btn" onclick="clearAll()">🗑 Clear</button>
    </div>
  </div>

  <div class="footer">Built with Claude AI · CodeAlpha Internship Project</div>

  <script>
    function updateCount() {
      const text = document.getElementById('inputText').value;
      if (text.length > 1000) {
        document.getElementById('inputText').value = text.slice(0, 1000);
      }
      document.getElementById('charCount').textContent = Math.min(text.length, 1000) + '/1000';
    }

    function swapLanguages() {
      const src = document.getElementById('sourceLang');
      const tgt = document.getElementById('targetLang');
      const tmp = src.value;
      src.value = tgt.value;
      tgt.value = tmp;

      const inputText = document.getElementById('inputText').value;
      const outputBox = document.getElementById('outputBox');
      if (outputBox.classList.contains('has-text')) {
        document.getElementById('inputText').value = outputBox.textContent;
        outputBox.textContent = inputText;
        updateCount();
      }
    }

    async function translate() {
      const inputText = document.getElementById('inputText').value.trim();
      if (!inputText) return;

      const sourceLang = document.getElementById('sourceLang').value;
      const targetLang = document.getElementById('targetLang').value;
      const outputBox = document.getElementById('outputBox');
      const btn = document.getElementById('translateBtn');
      const copyBtn = document.getElementById('copyBtn');

      outputBox.className = 'output-box';
      outputBox.innerHTML = '<div class="loader"><div class="spinner"></div> Translating...</div>';
      btn.disabled = true;
      copyBtn.style.display = 'none';

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{
              role: 'user',
              content: `Translate the following text from ${sourceLang} to ${targetLang}. Return ONLY the translated text, nothing else.\n\nText: ${inputText}`
            }]
          })
        });
        const data = await response.json();
        const result = data.content?.[0]?.text || 'Translation failed.';
        outputBox.textContent = result;
        outputBox.className = 'output-box has-text';
        copyBtn.style.display = 'block';
      } catch (e) {
        outputBox.textContent = '⚠️ Translation failed. Please try again.';
        outputBox.className = 'output-box error';
      } finally {
        btn.disabled = false;
      }
    }

    function copyText() {
      const text = document.getElementById('outputBox').textContent;
      navigator.clipboard.writeText(text);
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✅ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
    }

    function clearAll() {
      document.getElementById('inputText').value = '';
      document.getElementById('outputBox').textContent = 'Translation will appear here...';
      document.getElementById('outputBox').className = 'output-box';
      document.getElementById('copyBtn').style.display = 'none';
      document.getElementById('charCount').textContent = '0/1000';
    }
  </script>
</body>
</html>
